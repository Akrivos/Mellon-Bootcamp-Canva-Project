<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale-1.0">
  <title>Kanban Page</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="kanban.css">
  <script src="kanban.js" defer></script>
</head>

<body id="body" data-theme="light">
  <div class="header">
    <div class="header-childs">
      <h2>Τεαμ Ροκετ | Kanban board</h2>
    </div>
    <button type="button" id="themeToggle">Toggle Theme</button>
    <div class="header-childs">
      <div class="TaskCreator">
        <form id="TaskCreator">
          <label for="TaskTitle">Task Title:</label>
          <input type="text" id="TaskTitle" name="ttitle" required><br>
          <label for="TaskDesc">Task Description:</label>
          <input type="text" id="TaskDesc" name="tdesc" required><br>
          <button type="submit" class="CreateTask">Submit</button>
        </form>
      </div>
    </div>
  </div>
  <hr>
  <div class="container">
    <div class="task-column">
      <h2>To Do</h2>
      <ul class="tasks" id="ToDoTasks">

      </ul>
    </div>
    <div class="task-column">
      <h2>In Progress</h2>
      <ul class="tasks" id="InProgressTasks">

      </ul>
    </div>
    <div class="task-column">
      <h2>Done</h2>
      <ul class="tasks" id="DoneTasks">

      </ul>
    </div>
  </div>
</body>

</html>
